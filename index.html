        :root {

        /* Fixed Background - Brand Identity */
        .hero-bg {

            z-index: -1;

        .syne { font-family: 'Syne', sans-serif; }
        
        .section-container {

            flex-direction: column;

        .content-panel {
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 1.5s ease-out;
        }

        .anthology-slide {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .anthology-slide:hover { transform: scale(1.015); }

        .glass-ui {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
        }

        .countdown-box {
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--accent-teal);
            padding: 1.25rem;
            border-radius: 20px;
            min-width: 85px;
        }

        .btn-action {
            background: white;
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 1.5rem 3.5rem;
            border-radius: 9999px;
            transition: all 0.4s ease;
            font-size: 0.8rem;
        }
        .btn-action:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255,255,255,0.4);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        
        .scroll-hint {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            opacity: 0.5;
        }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

    <script>
        // Countdown to March 20, 2026
        const releaseDate = new Date("March 20, 2026 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const dist = releaseDate - now;
            const d = Math.floor(dist / (1000 * 60 * 60 * 24));
            const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((dist % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

            if (dist < 0) {
                document.getElementById("timer").innerHTML = "<div class='syne text-3xl text-teal-400 uppercase tracking-tighter animate-pulse italic'>The Era Has Begun</div>";
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
